<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARP Encyclopedia - 幻想事典</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #d4af37;
            --accent-gold: #f9e27d;
            --bg-dark: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --glass-border: rgba(212, 175, 55, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            color: var(--primary-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5rem;
        }

        .search-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
            position: sticky;
            top: 2rem;
            z-index: 100;
        }

        #search-input {
            width: 100%;
            padding: 1.2rem 2rem;
            background: rgba(10, 12, 16, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            font-family: 'Noto Serif JP', serif;
        }

        #search-input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .filter-tags {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .tag.active, .tag:hover {
            background: var(--primary-gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .dictionary-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .term-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .term-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .term-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 0;
            background: var(--primary-gold);
            transition: var(--transition);
        }

        .term-card:hover::before {
            height: 100%;
        }

        .category-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .term-name {
            font-size: 1.8rem;
            color: var(--accent-gold);
            margin-bottom: 0.2rem;
        }

        .term-reading {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .term-definition {
            font-size: 1rem;
            color: var(--text-main);
            flex-grow: 1;
        }

        .term-meta {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        footer {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .term-card {
            animation: fadeIn 0.6s ease forwards;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .dictionary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Create LARP Organization Symphony Seeker</div>
    <h1>LARP ENCYCLOPEDIA</h1>
</header>

<div class="search-container">
    <input type="text" id="search-input" placeholder="用語を検索... (例: タイムイン, CCC, 設定)">
</div>

<div class="filter-tags" id="category-filters">
    <div class="tag active" data-category="all">ALL</div>
    <div class="tag" data-category="SYSTEM">SYSTEM</div>
    <div class="tag" data-category="WORLD">WORLD</div>
    <div class="tag" data-category="ETIQUETTE">ETIQUETTE</div>
    <div class="tag" data-category="PROPS">PROPS</div>
</div>

<div class="dictionary-grid" id="dictionary-grid">
    <!-- 用語カードがここに挿入されます -->
</div>

<footer>
    &copy; 2026 CLOSS LARP Design Studio. All Rights Reserved.
</footer>

<script>
    const dictionaryData = [
        {
            name: "アウトオブキャラクター (OOC)",
            reading: "あうとおぶきゃらくたー",
            category: "SYSTEM",
            definition: "プレイヤー自身として発言や行動をすること。またはその状態。ゲーム外の会話や、メタ的な確認を行う際に用いられる。",
            meta: "対義語: IC（インキャラクター）"
        },
        {
            name: "インキャラクター (IC)",
            reading: "いんきゃらくたー",
            category: "SYSTEM",
            definition: "キャラクターとして振る舞っている状態。物語内の人物として行動・発言すること。",
            meta: "対義語: OOC（アウトオブキャラクター）"
        },
        {
            name: "安全管理 (Safety)",
            reading: "あんぜんかんり",
            category: "ETIQUETTE",
            definition: "身体的・精神的な安全を確保するための仕組み。LARPにおいて最も優先されるべき事項。ストップシグナルやOKチェックが含まれる。",
            meta: "最優先事項"
        },
        {
            name: "一時的狂気",
            reading: "いちじてききょうき",
            category: "SYSTEM",
            definition: "恐怖判定で失敗した際に発症する精神異常。硬直、パニック、忘却など、トランプの数字に応じた症状が現れる。",
            meta: "メメントモリ・ライト"
        },
        {
            name: "顕現狂気",
            reading: "けんげんきょうき",
            category: "SYSTEM",
            definition: "我壊値が0の状態でさらなる精神ダメージを受けた際に発症する深刻な狂気。スート（♠♥♦♣）が4つ揃うとロストとなる。",
            meta: "メメントモリ・ライト"
        },
        {
            name: "我壊値 (Gakaichi)",
            reading: "がかいち",
            category: "SYSTEM",
            definition: "精神的な耐久力を示す数値。恐怖判定の失敗などで減少する。",
            meta: "リソース管理"
        },
        {
            name: "鏡の中の無限回廊",
            reading: "かがみのなかのむげんかいろう",
            category: "WORLD",
            definition: "鏡の世界を舞台にしたクローズドシナリオ。協力型の調査システムと『禁忌の代償』メカニクスが特徴。",
            meta: "Project: 鏡の中の無限回廊"
        },
        {
            name: "環境音 (Ambient Sound)",
            reading: "かんきょうおん",
            category: "PROPS",
            definition: "没入感を高めるために流されるBGMや効果音。シーンの雰囲気を決定づける重要な要素。",
            meta: "演出技術"
        },
        {
            name: "恐怖判定 (Fear Check)",
            reading: "きょうふはんてい",
            category: "SYSTEM",
            definition: "恐ろしい出来事に遭遇した際、正気を保てるかをトランプで判定すること。",
            meta: "基本メカニクス"
        },
        {
            name: "クロスハンド",
            reading: "くろすはんど",
            category: "ETIQUETTE",
            definition: "両腕を胸の前で交差させるジェスチャー。プレイヤー（メタ）としての発言であることを周囲に示す。",
            meta: "共通マナー"
        },
        {
            name: "探求者 (Seeker)",
            reading: "たんきゅうしゃ",
            category: "SYSTEM",
            definition: "メメントモリ・ライトにおけるプレイヤーキャラクター（PC）の呼称。真実を追い求める者たち。",
            meta: "PC呼称"
        },
        {
            name: "タイムイン (Time In)",
            reading: "たいむいん",
            category: "SYSTEM",
            definition: "ゲームの開始、または中断後の再開を告げる合図。この合図以降、全ての参加者はキャラクターとして振る舞う。",
            meta: "基本コマンド"
        },
        {
            name: "タイムアウト (Time Out)",
            reading: "たいむあうと",
            category: "SYSTEM",
            definition: "ゲームの一次中断、または終了を告げる合図。緊急時にも使用され、この間はメタ的な会話が許可される。",
            meta: "停止コマンド"
        },
        {
            name: "誓約の檻 (Time Cage)",
            reading: "せいやくのおり",
            category: "WORLD",
            definition: "シリーズ作品の根幹をなす概念。特定の条件下で繰り返される時間のループや閉鎖空間を指す。逃れられぬ運命の象徴。",
            meta: "Project: Time Cage"
        },
        {
            name: "投影 (Projection)",
            reading: "とうえい",
            category: "SYSTEM",
            definition: "プレイヤーがキャラクターに自身の感情を乗せること、またはその逆。過度な投影は『ブリード』と呼ばれ、ケアが必要になる場合がある。",
            meta: "心理적メカニクス"
        },
        {
            name: "フリーズ (Freeze)",
            reading: "ふりーず",
            category: "SYSTEM",
            definition: "全員がその場で動きを止める演出用コマンド。GMが情報の追加や状況の変更を行う際に使用する。",
            meta: "演出コマンド"
        },
        {
            name: "ブリード (Bleed)",
            reading: "ぶりーど",
            category: "SYSTEM",
            definition: "キャラクターの感情がプレイヤーに（Bleed-out）、あるいはその逆に（Bleed-in）漏れ出す現象。",
            meta: "心理的メカニクス"
        },
        {
            name: "メメントモリ・ライト",
            reading: "めめんともりらいと",
            category: "SYSTEM",
            definition: "狂気と調査を軸としたホラーサスペンス向けの軽量ルールシステム。多くのプロジェクトの基盤となっている。",
            meta: "標準システム"
        },
        {
            name: "メディック (Medic)",
            reading: "めでぃっく",
            category: "ETIQUETTE",
            definition: "実際の負傷や体調不良が発生した際に使用する緊急合図。ゲーム内の『回復魔法』などと混同しないための絶対的なルール。",
            meta: "安全管理"
        },
        {
            name: "☆ チェック ☆",
            reading: "ちぇっく",
            category: "SYSTEM",
            definition: "GMが状況を確認する際の標準コマンド。判定の発生や情報の開示をプレイヤーに促す。",
            meta: "MEMENTO MORI LIGHT準拠"
        }
    ];

    const grid = document.getElementById('dictionary-grid');
    const searchInput = document.getElementById('search-input');
    const filterTags = document.querySelectorAll('.tag');
    let currentCategory = 'all';

    function renderDictionary(data) {
        grid.innerHTML = '';
        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'term-card';
            card.style.animationDelay = `${index * 0.05}s`;
            card.innerHTML = `
                <div class="category-badge">${item.category}</div>
                <h2 class="term-name">${item.name}</h2>
                <div class="term-reading">${item.reading}</div>
                <div class="term-definition">${item.definition}</div>
                <div class="term-meta">${item.meta}</div>
            `;
            grid.appendChild(card);
        });
    }

    function filterData() {
        const query = searchInput.value.toLowerCase();
        const filtered = dictionaryData.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(query) || 
                                item.reading.includes(query) || 
                                item.definition.includes(query);
            const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
            return matchesSearch && matchesCategory;
        });
        renderDictionary(filtered);
    }

    searchInput.addEventListener('input', filterData);

    filterTags.forEach(tag => {
        tag.addEventListener('click', () => {
            filterTags.forEach(t => t.classList.remove('active'));
            tag.classList.add('active');
            currentCategory = tag.dataset.category;
            filterData();
        });
    });

    // 初期表示
    renderDictionary(dictionaryData);
</script>

</body>
</html>
